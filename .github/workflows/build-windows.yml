name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron-builder\Cache
            ~\AppData\Local\electron\Cache
          key: electron-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build Electron App (Windows)
        run: npx quasar build -m electron
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          # Deshabilita firma de código en CI (no hay certificado)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''

      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== Contenido de dist/electron ==="
          if (Test-Path "dist/electron") {
            Get-ChildItem -Recurse "dist/electron" | Select-Object FullName, Length
          } else {
            Write-Error "El directorio dist/electron no existe. El build falló."
            exit 1
          }

      - name: Upload Windows Installer (.exe)
        uses: actions/upload-artifact@v4
        with:
          name: UP-Ros-Windows-Installer
          path: |
            dist/electron/Packaged/*.exe
            dist/electron/Packaged/*.zip
          if-no-files-found: error

      - name: Upload Full Package
        uses: actions/upload-artifact@v4
        with:
          name: UP-Ros-Windows-Full
          path: dist/electron/Packaged/
          if-no-files-found: warn
